<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Sabotage - Phase 1</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --accent-color: #16213e;
            --grid-color: #0f3460;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LAYOUT CONTAINER (Flexbox) --- */
        #game-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- LEFT SIDEBAR (Leaderboard & Logs) --- */
        #left-sidebar {
            flex: 1;
            background-color: var(--accent-color);
            border: 2px solid var(--grid-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 8px;
        }

        #leaderboard {
            margin-bottom: 20px;
        }

        #kill-feed {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid var(--grid-color);
            padding-top: 10px;
            font-size: 0.8rem;
            color: #ccc;
        }

        /* --- CENTER (The Game) --- */
        #center-stage {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
            border: 4px solid var(--text-color);
            /* Crisp edges for pixel art feel */
            image-rendering: pixelated; 
        }

        #status-bar {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        /* --- RIGHT SIDEBAR (Ads) --- */
        #right-sidebar {
            flex: 0 0 300px; /* Fixed width for standard ad unit */
            background-color: #222;
            border: 2px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #555;
        }

        /* --- UI HELPERS --- */
        .highlight { color: var(--text-color); }
        .buff-msg { color: cyan; }
        .sabotage-msg { color: #ff4444; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="left-sidebar">
        <h3>Leaderboard</h3>
        <div id="leaderboard-list">
            <div class="row">1. YOU - <span id="ui-score">0</span></div>
            <div class="row" style="color: #666">2. Bot_Alpha - 950</div>
            <div class="row" style="color: #666">3. Bot_Beta - 820</div>
        </div>
        <h3>Event Log</h3>
        <div id="kill-feed">
            <div>Welcome to Snake Sabotage.</div>
            <div>Phase 1: Local Engine Test.</div>
        </div>
    </div>

    <div id="center-stage">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="status-bar">
            <div>SCORE: <span id="score-display">0</span></div>
            <div>STATUS: <span id="status-display" style="color: lime">ALIVE</span></div>
        </div>
    </div>

    <div id="right-sidebar">
        <div>Ad Space (300x600)</div>
    </div>
</div>

<script>
/**
 * ==========================================
 * CONFIGURATION & CONSTANTS
 * ==========================================
 */
const CONFIG = {
    CANVAS_SIZE: 600,
    GRID_SIZE: 20, 
    TICK_RATE: 12, 
    
    // Configurable Item Limits
    MAX_ITEMS: 2, 
    GOLD_LIFETIME: 5000, // Gold orbs disappear after 5 seconds

    SPAWN_RATES: {
        GREEN: 0.60,  
        GOLD:  0.10,  
        BLUE:  0.15,  
        RED:   0.15   
    },

    SCORES: {
        GREEN: 5,
        GOLD: 15,
        BLUE: 0, 
        RED: 0
    },

    COLORS: {
        SNAKE_HEAD: '#e94560',
        SNAKE_BODY: '#ff8a9d',
        ORB_GREEN: '#2ecc71',
        ORB_GOLD:  '#f1c40f',
        ORB_BLUE:  '#00ffff',
        ORB_RED:   '#ff0000'
    }
};

const TILE_COUNT = CONFIG.CANVAS_SIZE / CONFIG.GRID_SIZE;

/**
 * ==========================================
 * INPUT HANDLER (FIXED FOR CAPS LOCK)
 * ==========================================
 */
class InputHandler {
    constructor() {
        this.direction = { x: 0, y: 0 };
        this.nextDirection = { x: 1, y: 0 };
        document.addEventListener('keydown', this.handleKey.bind(this));
    }

    handleKey(e) {
        // Prevent scrolling for arrows
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
            e.preventDefault();
        }

        // We switch on e.code, which ignores Caps Lock
        switch(e.code) {
            case 'KeyW': 
            case 'ArrowUp':
                if (this.direction.y === 0) this.nextDirection = { x: 0, y: -1 }; 
                break;
            case 'KeyS': 
            case 'ArrowDown':
                if (this.direction.y === 0) this.nextDirection = { x: 0, y: 1 }; 
                break;
            case 'KeyA': 
            case 'ArrowLeft':
                if (this.direction.x === 0) this.nextDirection = { x: -1, y: 0 }; 
                break;
            case 'KeyD': 
            case 'ArrowRight':
                if (this.direction.x === 0) this.nextDirection = { x: 1, y: 0 }; 
                break;
        }
    }

    update() {
        this.direction = this.nextDirection;
    }
}

/**
 * ==========================================
 * SNAKE ENTITY
 * ==========================================
 */
class Snake {
    constructor() {
        this.score = 0; 
        this.reset();
    }

    reset(startLength = 3) {
        this.alive = true;
        this.body = [];
        const safeLength = isNaN(startLength) || startLength < 3 ? 3 : startLength;
        const startX = 10; 
        const startY = 15;

        for (let i = 0; i < safeLength; i++) {
            this.body.push({ x: startX - i, y: startY });
        }
    }

    update(inputDir) {
        if (!this.alive) return;

        const head = { ...this.body[0] };
        head.x += inputDir.x;
        head.y += inputDir.y;

        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
            this.die();
            return;
        }

        for (let segment of this.body) {
            if (head.x === segment.x && head.y === segment.y) {
                this.die();
                return;
            }
        }

        this.body.unshift(head);
    }

    die() {
        this.alive = false;
        this.score = Math.floor(this.score * 0.8); 
    }
}

/**
 * ==========================================
 * GAME ENGINE
 * ==========================================
 */
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.input = new InputHandler();
        this.snake = new Snake();
        
        this.items = []; 
        this.refreshSpawns(); 

        this.lastTime = 0;
        this.tickInterval = 1000 / CONFIG.TICK_RATE;
        this.respawnTimer = null;
        
        // --- NEW: State Flag for Respawn ---
        this.waitingForRespawnInput = false;

        this.uiScore = document.getElementById('score-display');
        this.uiMainScore = document.getElementById('ui-score');
        this.uiStatus = document.getElementById('status-display');
        this.uiLog = document.getElementById('kill-feed');

        // --- NEW: Global Key Listener for Respawn ---
        window.addEventListener('keydown', () => {
            if (this.waitingForRespawnInput) {
                this.triggerRespawn();
            }
        });

        requestAnimationFrame(this.gameLoop.bind(this));
    }

    log(msg, styleClass) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        if (styleClass) div.className = styleClass;
        this.uiLog.prepend(div);
    }

    refreshSpawns() {
        this.items = [];
        for(let i=0; i < CONFIG.MAX_ITEMS; i++) {
            this.spawnSingleItem();
        }
    }

    spawnSingleItem() {
        let position;
        let valid = false;
        let attempts = 0;
        while (!valid && attempts < 100) {
            attempts++;
            position = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            valid = true;
            for(let seg of this.snake.body) {
                if(seg.x === position.x && seg.y === position.y) valid = false;
            }
            for(let item of this.items) {
                 if(item.x === position.x && item.y === position.y) valid = false;
            }
        }

        const rand = Math.random();
        let type = 'GREEN';
        if (rand < CONFIG.SPAWN_RATES.GREEN) type = 'GREEN';
        else if (rand < CONFIG.SPAWN_RATES.GREEN + CONFIG.SPAWN_RATES.GOLD) type = 'GOLD';
        else if (rand < CONFIG.SPAWN_RATES.GREEN + CONFIG.SPAWN_RATES.GOLD + CONFIG.SPAWN_RATES.BLUE) type = 'BLUE';
        else type = 'RED';

        this.items.push({ 
            x: position.x, 
            y: position.y, 
            type: type,
            spawnTime: Date.now()
        });
    }

    update() {
        if (!this.snake.alive) return;

        this.input.update();
        this.snake.update(this.input.direction);

        const head = this.snake.body[0];
        let ate = false;
        let eatenItemIndex = -1;

        // Despawn Gold Logic
        const now = Date.now();
        for (let i = this.items.length - 1; i >= 0; i--) {
            const item = this.items[i];
            if (item.type === 'GOLD') {
                if (now - item.spawnTime > CONFIG.GOLD_LIFETIME) {
                    this.items.splice(i, 1);
                    this.spawnSingleItem(); 
                }
            }
        }

        // Eat Logic
        for (let i = 0; i < this.items.length; i++) {
            const item = this.items[i];
            if (head.x === item.x && head.y === item.y) {
                eatenItemIndex = i;
                ate = true;
                break; 
            }
        }

        if (ate) {
            const item = this.items[eatenItemIndex];
            this.snake.score += CONFIG.SCORES[item.type];
            this.updateUI();
            this.handleItemCollection(item);
            this.refreshSpawns();
        } else {
            if (this.snake.alive) {
                this.snake.body.pop();
            }
        }

        if (!this.snake.alive && !this.respawnTimer && !this.waitingForRespawnInput) {
            this.handleDeath();
        }
    }

    handleItemCollection(item) {
        if (item.type === 'RED') {
            this.log("Red Star! Sending Sabotage...", 'sabotage-msg');
        } else if (item.type === 'BLUE') {
            const buffs = ['SpeedDown', 'ShortenTail', 'Invincible'];
            const randomBuff = buffs[Math.floor(Math.random() * buffs.length)];
            this.log(`Blue Orb! Buff: ${randomBuff}`, 'buff-msg');
             if (randomBuff === 'ShortenTail' && this.snake.body.length > 3) {
                this.snake.body.pop();
            }
        } else if (item.type === 'GOLD') {
            this.log("GOLD ORB! +15 Points", 'highlight');
        }
    }

    handleDeath() {
        this.uiStatus.textContent = "DEAD (Respawn 3s)";
        this.uiStatus.style.color = "red";
        this.log(`Died. Score: ${this.snake.score}. Penalizing...`, 'sabotage-msg');
        
        // 1. Wait 3 seconds (Cooldown)
        this.respawnTimer = setTimeout(() => {
            // 2. Change State to "Waiting for Input"
            this.waitingForRespawnInput = true;
            this.uiStatus.textContent = "PRESS ANY KEY";
            this.uiStatus.style.color = "white"; // Make it visible
            
            // Clear the timer so we don't loop
            this.respawnTimer = null;
        }, 3000);
    }

    // --- NEW: Actual Respawn Trigger ---
    triggerRespawn() {
        this.waitingForRespawnInput = false; // Lock input again
        
        const newLength = Math.max(3, Math.floor(this.snake.score / 5) + 3);
        this.snake.reset(newLength);
        this.refreshSpawns();
        
        this.uiStatus.textContent = "ALIVE";
        this.uiStatus.style.color = "lime";
        this.input.nextDirection = { x: 1, y: 0 };
        this.updateUI();
    }

    updateUI() {
        this.uiScore.textContent = this.snake.score;
        this.uiMainScore.textContent = this.snake.score;
    }

    draw() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, CONFIG.CANVAS_SIZE, CONFIG.CANVAS_SIZE);

        const now = Date.now();

        // Draw Items
        for (const item of this.items) {
            const px = item.x * CONFIG.GRID_SIZE;
            const py = item.y * CONFIG.GRID_SIZE;
            const center = CONFIG.GRID_SIZE / 2;

            if (item.type === 'GREEN') this.ctx.fillStyle = CONFIG.COLORS.ORB_GREEN;
            else if (item.type === 'GOLD') this.ctx.fillStyle = CONFIG.COLORS.ORB_GOLD;
            else if (item.type === 'BLUE') this.ctx.fillStyle = CONFIG.COLORS.ORB_BLUE;
            else if (item.type === 'RED') this.ctx.fillStyle = CONFIG.COLORS.ORB_RED;

            if (item.type === 'GOLD') {
                const age = now - item.spawnTime;
                if (age > CONFIG.GOLD_LIFETIME - 1500) {
                     if (Math.floor(Date.now() / 100) % 2 === 0) {
                         this.ctx.fillStyle = '#fff'; 
                     }
                }
            }

            this.ctx.beginPath();
            this.ctx.arc(px + center, py + center, center - 2, 0, Math.PI * 2);
            this.ctx.fill();

            if (item.type === 'GOLD') {
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
            }
            if (item.type === 'RED') {
                this.ctx.fillStyle = CONFIG.COLORS.ORB_RED;
                this.ctx.beginPath();
                this.ctx.moveTo(px + center, py);
                this.ctx.lineTo(px + CONFIG.GRID_SIZE, py + center);
                this.ctx.lineTo(px + center, py + CONFIG.GRID_SIZE);
                this.ctx.lineTo(px, py + center);
                this.ctx.fill();
            }
        }

        if (this.snake.alive || Math.floor(Date.now() / 200) % 2 === 0) {
            this.snake.body.forEach((seg, index) => {
                this.ctx.fillStyle = index === 0 ? CONFIG.COLORS.SNAKE_HEAD : CONFIG.COLORS.SNAKE_BODY;
                this.ctx.fillRect(
                    seg.x * CONFIG.GRID_SIZE + 1, 
                    seg.y * CONFIG.GRID_SIZE + 1, 
                    CONFIG.GRID_SIZE - 2, 
                    CONFIG.GRID_SIZE - 2
                );
            });
        }
    }

    gameLoop(currentTime) {
        const deltaTime = currentTime - this.lastTime;
        if (deltaTime > this.tickInterval) {
            this.update();
            this.draw();
            this.lastTime = currentTime - (deltaTime % this.tickInterval);
        }
        requestAnimationFrame(this.gameLoop.bind(this));
    }
}

window.onload = () => { const game = new Game(); };
</script>

</body>
</html>
