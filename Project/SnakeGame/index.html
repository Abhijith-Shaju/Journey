<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Sabotage - Phase 1 (Clean)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --accent-color: #16213e;
            --grid-color: #0f3460;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LAYOUT CONTAINER (Flexbox) --- */
        #game-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- LEFT SIDEBAR (Leaderboard & Logs) --- */
        #left-sidebar {
            flex: 1;
            background-color: var(--accent-color);
            border: 2px solid var(--grid-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 8px;
        }

        #leaderboard {
            margin-bottom: 20px;
        }

        #kill-feed {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid var(--grid-color);
            padding-top: 10px;
            font-size: 0.8rem;
            color: #ccc;
        }

        /* --- CENTER (The Game) --- */
        #center-stage {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
            border: 4px solid var(--text-color);
            image-rendering: pixelated; 
        }

        #status-bar {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        /* --- RIGHT SIDEBAR (Ads) --- */
        #right-sidebar {
            flex: 0 0 300px; /* Fixed width for standard ad unit */
            background-color: #222;
            border: 2px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #555;
        }

        /* --- UI HELPERS --- */
        .highlight { color: var(--text-color); }
        .buff-msg { color: cyan; }
        .sabotage-msg { color: #ff4444; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="left-sidebar">
        <h3>Leaderboard</h3>
        <div id="leaderboard-list">
            <div class="row">1. YOU - <span id="ui-score">0</span></div>
            <div class="row" style="color: #666">2. Bot_Alpha - 950</div>
            <div class="row" style="color: #666">3. Bot_Beta - 820</div>
        </div>
        <h3>Event Log</h3>
        <div id="kill-feed">
            <div>Welcome to Snake Sabotage.</div>
            <div>Phase 1: Local Engine Test.</div>
        </div>
    </div>

    <div id="center-stage">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="status-bar">
            <div>SCORE: <span id="score-display">0</span></div>
            <div>STATUS: <span id="status-display" style="color: lime">ALIVE</span></div>
        </div>
    </div>

    <div id="right-sidebar">
        <div>Ad Space (300x600)</div>
    </div>
</div>

<script>
/**
 * ==========================================
 * CONFIGURATION & CONSTANTS
 * ==========================================
 */
const CONFIG = {
    CANVAS_SIZE: 600,
    GRID_SIZE: 20,
    TICK_RATE: 12,
    
    MAX_ITEMS: 2,
    GOLD_LIFETIME: 5000,
    
    SPAWN_RATES: {
        GREEN: 0.60,
        GOLD: 0.10,
        BLUE: 0.15,
        RED: 0.15
    },
    
    SCORES: {
        GREEN: 5,
        GOLD: 15,
        BLUE: 0,
        RED: 0
    },
    
    COLORS: {
        SNAKE_HEAD: '#e94560',
        SNAKE_BODY: '#ff8a9d',
        ORB_GREEN: '#2ecc71',
        ORB_GOLD: '#f1c40f',
        ORB_BLUE: '#00ffff',
        ORB_RED: '#ff0000'
    }
};

const TILE_COUNT = CONFIG.CANVAS_SIZE / CONFIG.GRID_SIZE;

/**
 * ==========================================
 * INPUT HANDLER
 * ==========================================
 * Manages keyboard input using e.code for layout independence.
 */
class InputHandler {
    constructor() {
        this.direction = { x: 1, y: 0 };
        this.nextDirection = { x: 1, y: 0 };
        document.addEventListener('keydown', (e) => this.handleKey(e));
    }

    handleKey(e) {
        // Prevent default scrolling behavior for arrow keys
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            e.preventDefault();
        }

        const currentDir = this.direction;

        switch (e.code) {
            case 'KeyW':
            case 'ArrowUp':
                if (currentDir.y === 0) {
                    this.nextDirection = { x: 0, y: -1 };
                }
                break;
            case 'KeyS':
            case 'ArrowDown':
                if (currentDir.y === 0) {
                    this.nextDirection = { x: 0, y: 1 };
                }
                break;
            case 'KeyA':
            case 'ArrowLeft':
                if (currentDir.x === 0) {
                    this.nextDirection = { x: -1, y: 0 };
                }
                break;
            case 'KeyD':
            case 'ArrowRight':
                if (currentDir.x === 0) {
                    this.nextDirection = { x: 1, y: 0 };
                }
                break;
        }
    }

    update() {
        this.direction = this.nextDirection;
    }
}

/**
 * ==========================================
 * SNAKE CLASS
 * ==========================================
 * Handles body segments, movement, and collision detection.
 */
class Snake {
    constructor() {
        this.score = 0;
        this.reset();
    }

    reset(startLength = 3) {
        // Ensure start length is valid
        const safeLength = Math.max(3, isNaN(startLength) ? 3 : startLength);
        
        this.alive = true;
        this.body = [];
        
        // Spawn coordinates (horizontal start)
        for (let i = 0; i < safeLength; i++) {
            this.body.push({ x: 10 - i, y: 15 });
        }
    }

    update(inputDirection) {
        if (!this.alive) return;

        // Create new head based on current direction
        const head = { ...this.body[0] };
        head.x += inputDirection.x;
        head.y += inputDirection.y;

        // 1. Check Wall Collision
        if (head.x < 0 || head.y < 0 || head.x >= TILE_COUNT || head.y >= TILE_COUNT) {
            this.die();
            return;
        }

        // 2. Check Self Collision
        for (let i = 0; i < this.body.length; i++) {
            if (head.x === this.body[i].x && head.y === this.body[i].y) {
                this.die();
                return;
            }
        }

        // Move head forward
        this.body.unshift(head);
        
        // Note: We do NOT pop the tail here. 
        // Tail management is done in Game.update() depending on if we ate food.
    }

    die() {
        this.alive = false;
        // Penalize score (Keep 80%)
        this.score = Math.max(0, Math.floor(this.score * 0.8));
    }
}

/**
 * ==========================================
 * MAIN GAME ENGINE
 * ==========================================
 * Orchestrates the game loop, rendering, and game state.
 */
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.input = new InputHandler();
        this.snake = new Snake();
        
        this.items = [];
        this.spawnInitialItems();

        this.lastTime = 0;
        this.tickInterval = 1000 / CONFIG.TICK_RATE;

        // Respawn State Flags
        this.waitingForInput = false;
        this.respawnTimer = null;

        // UI References
        this.uiScore = document.getElementById('score-display');
        this.uiMainScore = document.getElementById('ui-score');
        this.uiStatus = document.getElementById('status-display');
        this.uiLog = document.getElementById('kill-feed');

        // Global Listener for Respawn Key
        window.addEventListener('keydown', () => {
            if (this.waitingForInput) {
                this.triggerRespawn();
            }
        });

        // Start Loop
        requestAnimationFrame((timestamp) => this.gameLoop(timestamp));
    }

    log(msg, className) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        if (className) div.className = className;
        this.uiLog.prepend(div);
    }

    spawnInitialItems() {
        this.items = [];
        for (let i = 0; i < CONFIG.MAX_ITEMS; i++) {
            this.spawnSingleItem();
        }
    }

    spawnSingleItem() {
        let attempts = 0;
        let validPosition = false;
        let position = { x: 0, y: 0 };

        // Try to find a free spot 200 times before giving up (prevents infinite loop)
        while (!validPosition && attempts < 200) {
            attempts++;
            position = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };

            validPosition = true;

            // Check Collision with Snake
            for (const segment of this.snake.body) {
                if (segment.x === position.x && segment.y === position.y) {
                    validPosition = false;
                    break;
                }
            }

            // Check Collision with Existing Items
            for (const item of this.items) {
                if (item.x === position.x && item.y === position.y) {
                    validPosition = false;
                    break;
                }
            }
        }

        if (validPosition) {
            // Determine Type based on Spawn Rates
            const rand = Math.random();
            let type = 'GREEN';
            
            if (rand < CONFIG.SPAWN_RATES.GREEN) {
                type = 'GREEN';
            } else if (rand < CONFIG.SPAWN_RATES.GREEN + CONFIG.SPAWN_RATES.GOLD) {
                type = 'GOLD';
            } else if (rand < CONFIG.SPAWN_RATES.GREEN + CONFIG.SPAWN_RATES.GOLD + CONFIG.SPAWN_RATES.BLUE) {
                type = 'BLUE';
            } else {
                type = 'RED';
            }

            this.items.push({
                x: position.x,
                y: position.y,
                type: type,
                spawnTime: Date.now()
            });
        }
    }

    update() {
        if (!this.snake.alive) return;

        this.input.update();
        this.snake.update(this.input.direction);

        const head = this.snake.body[0];
        // If snake died during update, stop here
        if (!head) return; 

        const now = Date.now();

        // 1. Remove Expired Gold Orbs
        this.items = this.items.filter(item => {
            if (item.type === 'GOLD' && now - item.spawnTime > CONFIG.GOLD_LIFETIME) {
                // Expired: Spawn a replacement to keep item count up
                this.spawnSingleItem(); 
                return false; // Remove from array
            }
            return true; // Keep in array
        });

        // 2. Ensure we always have max items (if some expired or were missing)
        while (this.items.length < CONFIG.MAX_ITEMS) {
            this.spawnSingleItem();
        }

        // 3. Check for Item Collection
        let eatenIndex = -1;
        for (let i = 0; i < this.items.length; i++) {
            if (this.items[i].x === head.x && this.items[i].y === head.y) {
                eatenIndex = i;
                break;
            }
        }

        if (eatenIndex > -1) {
            // --- ITEM EATEN ---
            const item = this.items[eatenIndex];
            
            // Add Score
            this.snake.score += CONFIG.SCORES[item.type];
            // Ensure score doesn't drop below 0 (just in case)
            if (this.snake.score < 0) this.snake.score = 0;

            // Handle Special Effects
            this.handleItemEffect(item);

            // Refresh Spawns (The "Chaos" Mechanic)
            this.spawnInitialItems();
            this.updateUI();

        } else {
            // --- NO ITEM EATEN ---
            // Remove tail to maintain current length (movement)
            this.snake.body.pop();
        }

        // 4. Death Check (Post-movement)
        if (!this.snake.alive && !this.respawnTimer && !this.waitingForInput) {
            this.handleDeath();
        }
    }

    handleItemEffect(item) {
        switch (item.type) {
            case 'RED':
                this.log('Red Star! Sabotage sent.', 'sabotage-msg');
                break;
            case 'BLUE':
                const buffs = ['SpeedDown', 'ShortenTail', 'Invincible'];
                const selectedBuff = buffs[Math.floor(Math.random() * buffs.length)];
                this.log(`Blue Orb! Buff: ${selectedBuff}`, 'buff-msg');
                
                if (selectedBuff === 'ShortenTail' && this.snake.body.length > 3) {
                    this.snake.body.pop();
                }
                break;
            case 'GOLD':
                this.log('GOLD ORB! +15 Points', 'highlight');
                break;
        }
    }

    handleDeath() {
        this.uiStatus.textContent = 'DEAD (Respawn 3s)';
        this.uiStatus.style.color = 'red';
        this.log(`Died. Score: ${this.snake.score}. Penalizing...`, 'sabotage-msg');

        // Start 3s Timer
        this.respawnTimer = setTimeout(() => {
            this.waitingForInput = true;
            this.uiStatus.textContent = 'PRESS ANY KEY';
            this.uiStatus.style.color = 'white';
            this.respawnTimer = null;
        }, 3000);
    }

    triggerRespawn() {
        this.waitingForInput = false;
        
        // Calculate new length based on conserved score (Conservation of Mass)
        // Formula: (Score / 5) + 3 Base
        const newLength = Math.max(3, Math.floor(this.snake.score / 5) + 3);
        
        this.snake.reset(newLength);
        this.spawnInitialItems();
        
        this.uiStatus.textContent = 'ALIVE';
        this.uiStatus.style.color = 'lime';
        this.input.nextDirection = { x: 1, y: 0 }; // Reset Input
        this.updateUI();
    }

    updateUI() {
        this.uiScore.textContent = this.snake.score;
        this.uiMainScore.textContent = this.snake.score;
    }

    draw() {
        const ctx = this.ctx;
        
        // Clear Screen
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, CONFIG.CANVAS_SIZE, CONFIG.CANVAS_SIZE);

        const now = Date.now();

        // Draw Items
        for (const item of this.items) {
            const px = item.x * CONFIG.GRID_SIZE;
            const py = item.y * CONFIG.GRID_SIZE;
            const center = CONFIG.GRID_SIZE / 2;

            ctx.beginPath();
            let color = CONFIG.COLORS.ORB_GREEN;

            // Determine Color & Blink Logic
            if (item.type === 'GOLD') {
                const age = now - item.spawnTime;
                // Blink white in last 1.5 seconds
                const isBlinking = age > CONFIG.GOLD_LIFETIME - 1500 && Math.floor(now / 150) % 2 === 0;
                color = isBlinking ? '#fff' : CONFIG.COLORS.ORB_GOLD;
            } else if (item.type === 'BLUE') {
                color = CONFIG.COLORS.ORB_BLUE;
            } else if (item.type === 'RED') {
                color = CONFIG.COLORS.ORB_RED;
            }

            ctx.fillStyle = color;

            if (item.type === 'RED') {
                // Draw Diamond for Red Star
                ctx.moveTo(px + center, py);
                ctx.lineTo(px + CONFIG.GRID_SIZE, py + center);
                ctx.lineTo(px + center, py + CONFIG.GRID_SIZE);
                ctx.lineTo(px, py + center);
                ctx.fill();
            } else {
                // Draw Circle for Orbs
                ctx.arc(px + center, py + center, center - 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Extra ring for Gold
                if (item.type === 'GOLD') {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        // Draw Snake
        if (this.snake.alive || Math.floor(now / 200) % 2 === 0) { // Blink if dead
            this.snake.body.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? CONFIG.COLORS.SNAKE_HEAD : CONFIG.COLORS.SNAKE_BODY;
                ctx.fillRect(
                    segment.x * CONFIG.GRID_SIZE + 1,
                    segment.y * CONFIG.GRID_SIZE + 1,
                    CONFIG.GRID_SIZE - 2,
                    CONFIG.GRID_SIZE - 2
                );
            });
        }
    }

    gameLoop(timestamp) {
        try {
            const deltaTime = timestamp - this.lastTime;
            
            if (deltaTime > this.tickInterval) {
                this.update();
                this.draw();
                // Adjust for lag to keep smooth tick rate
                this.lastTime = timestamp - (deltaTime % this.tickInterval);
            }
        } catch (err) {
            console.error("Game Loop Error:", err);
            this.log('Engine error — recovered safely.', 'sabotage-msg');
        }
        
        requestAnimationFrame((t) => this.gameLoop(t));
    }
}

// Start Game
window.onload = () => new Game();
</script>

</body>
</html>
